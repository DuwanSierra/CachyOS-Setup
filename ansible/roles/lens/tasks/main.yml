---
- name: Check if open-lens is already installed
  ansible.builtin.command:
    cmd: pacman -Q open-lens
  register: lens_installed
  changed_when: false
  failed_when: false

- name: Install open-lens via yay
  ansible.builtin.command:
    cmd: yay -S --noconfirm --sudoflags "-A" open-lens
  environment:
    SUDO_ASKPASS: "{{ yay_askpass }}"
  when: lens_installed.rc != 0
  changed_when: true
