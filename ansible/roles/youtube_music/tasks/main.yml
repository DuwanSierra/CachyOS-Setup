---
- name: Check if pear-desktop is already installed
  ansible.builtin.command:
    cmd: pacman -Q pear-desktop
  register: ytmusic_installed
  changed_when: false
  failed_when: false

- name: Install YouTube Music (pear-desktop) via yay
  ansible.builtin.command:
    cmd: yay -S --noconfirm --sudoflags "-A" pear-desktop
  environment:
    SUDO_ASKPASS: "{{ yay_askpass }}"
  when: ytmusic_installed.rc != 0
  changed_when: true
