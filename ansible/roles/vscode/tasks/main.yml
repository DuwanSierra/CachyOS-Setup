---
- name: Check if visual-studio-code-bin is already installed
  ansible.builtin.command:
    cmd: pacman -Q visual-studio-code-bin
  register: vscode_installed
  changed_when: false
  failed_when: false

- name: Install Visual Studio Code (Microsoft build) via yay
  ansible.builtin.command:
    cmd: yay -S --noconfirm --sudoflags "-A" visual-studio-code-bin
  environment:
    SUDO_ASKPASS: "{{ yay_askpass }}"
  when: vscode_installed.rc != 0
  changed_when: true
