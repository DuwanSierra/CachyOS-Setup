---
# yay llama a sudo internamente sin TTY cuando corre desde Ansible.
# Defaults !requiretty permite que sudo funcione sin terminal abierta.
- name: Allow sudo without TTY for AUR builds
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/notty
    line: 'Defaults !requiretty'
    create: true
    validate: 'visudo -cf %s'
    mode: '0440'
  become: true

- name: Check if visual-studio-code-bin is already installed
  ansible.builtin.command:
    cmd: pacman -Q visual-studio-code-bin
  register: vscode_installed
  changed_when: false
  failed_when: false

- name: Install Visual Studio Code (Microsoft build) via yay
  ansible.builtin.command:
    cmd: yay -S --noconfirm visual-studio-code-bin
  when: vscode_installed.rc != 0
  changed_when: true
