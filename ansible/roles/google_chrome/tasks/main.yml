---
- name: Check if google-chrome is already installed
  ansible.builtin.command:
    cmd: pacman -Q google-chrome
  register: chrome_installed
  changed_when: false
  failed_when: false

- name: Install Google Chrome via yay
  ansible.builtin.command:
    cmd: yay -S --noconfirm --sudoflags "-A" google-chrome
  environment:
    SUDO_ASKPASS: "{{ yay_askpass }}"
  when: chrome_installed.rc != 0
  changed_when: true
